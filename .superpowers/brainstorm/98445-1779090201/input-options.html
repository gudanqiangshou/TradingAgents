<h2>输入区方案</h2>
<p class="subtitle">用户提交分析请求时，需要填写哪些内容？</p>

<div class="cards">

  <!-- Option A: Simple -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0f1117;padding:16px;border-radius:6px">
      <div style="max-width:360px;margin:0 auto">
        <div style="color:#e2e8f0;font-size:13px;font-weight:bold;margin-bottom:4px">输入股票代码</div>
        <div style="color:#6b7280;font-size:10px;margin-bottom:12px">支持美股、港股、A股、加密货币</div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:#1a1d2e;border:1px solid #374151;border-radius:6px;padding:10px 12px;color:#e2e8f0;font-size:14px">TSLA</div>
          <div style="background:#7c85ff;color:#fff;border-radius:6px;padding:10px 20px;font-size:13px;font-weight:bold;cursor:pointer">分析</div>
        </div>
        <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
          <span style="background:#1a1d2e;color:#6b7280;padding:3px 8px;border-radius:12px;font-size:10px;cursor:pointer">NVDA</span>
          <span style="background:#1a1d2e;color:#6b7280;padding:3px 8px;border-radius:12px;font-size:10px;cursor:pointer">BTC-USD</span>
          <span style="background:#1a1d2e;color:#6b7280;padding:3px 8px;border-radius:12px;font-size:10px;cursor:pointer">700.HK</span>
          <span style="background:#1a1d2e;color:#6b7280;padding:3px 8px;border-radius:12px;font-size:10px;cursor:pointer">600519.SS</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A · 极简输入</h3>
      <p>只填股票代码，一键分析，所有智能体默认全开。快速上手，0学习成本。</p>
    </div>
  </div>

  <!-- Option B: With config -->
  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0f1117;padding:16px;border-radius:6px">
      <div style="max-width:380px;margin:0 auto">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1;background:#1a1d2e;border:1px solid #374151;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:13px">TSLA</div>
          <div style="background:#1a1d2e;border:1px solid #374151;border-radius:6px;padding:8px 12px;color:#94a3b8;font-size:12px">2026-05-18</div>
        </div>
        <div style="color:#94a3b8;font-size:10px;margin-bottom:6px">选择分析师团队</div>
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
          <span style="background:#7c85ff22;border:1px solid #7c85ff;color:#a5b4ff;padding:4px 10px;border-radius:12px;font-size:10px">✓ 市场</span>
          <span style="background:#7c85ff22;border:1px solid #7c85ff;color:#a5b4ff;padding:4px 10px;border-radius:12px;font-size:10px">✓ 情绪</span>
          <span style="background:#7c85ff22;border:1px solid #7c85ff;color:#a5b4ff;padding:4px 10px;border-radius:12px;font-size:10px">✓ 新闻</span>
          <span style="background:#1a1d2e;border:1px solid #374151;color:#6b7280;padding:4px 10px;border-radius:12px;font-size:10px">基本面</span>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:#1a1d2e;border:1px solid #374151;border-radius:6px;padding:6px 10px">
            <div style="color:#6b7280;font-size:9px">输出语言</div>
            <div style="color:#e2e8f0;font-size:11px">中文 ▾</div>
          </div>
          <div style="background:#7c85ff;color:#fff;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:bold">开始分析</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B · 带配置项</h3>
      <p>可选分析日期、勾选/取消某些分析师、选择输出语言。灵活但多一步操作。</p>
    </div>
  </div>

</div>
