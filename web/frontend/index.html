<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingAgents — 多智能体金融分析</title>
  <link rel="stylesheet" href="style.css?v=2">
  <script src="vendor/marked-12.0.2.min.js"></script>
  <script src="vendor/purify-3.1.7.min.js"></script>
</head>
<body>
  <!-- Top Nav -->
  <nav class="topnav">
    <div class="topnav-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">TradingAgents</span>
      <span class="brand-sep">|</span>
      <span class="brand-sub">多智能体金融分析</span>
    </div>
    <div class="topnav-model" id="model-label">Powered by DeepSeek</div>
  </nav>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-group">
      <label class="input-label">代码</label>
      <input id="ticker-input" class="ticker-input" type="text" name="ticker"
             placeholder="TSLA / BTC-USD / 700.HK" autocomplete="off"
             autocapitalize="characters" spellcheck="false"
             data-1p-ignore data-lpignore="true">
    </div>
    <div class="input-group">
      <label class="input-label">日期</label>
      <input id="date-input" class="date-input" type="date">
    </div>
    <div class="analyst-pills" id="analyst-pills">
      <button class="pill active" data-analyst="market">市场</button>
      <button class="pill active" data-analyst="social">情绪</button>
      <button class="pill active" data-analyst="news">新闻</button>
      <button class="pill active" data-analyst="fundamentals">基本面</button>
    </div>
    <div class="input-group">
      <select id="language-select" class="language-select">
        <option value="Chinese">🌐 中文</option>
        <option value="English">🌐 English</option>
      </select>
    </div>
    <button id="submit-btn" class="submit-btn">开始分析</button>
    <button id="history-btn" class="submit-btn" style="background:#374151">📋 历史</button>
  </div>

  <!-- Busy Overlay -->
  <div id="busy-overlay" class="busy-overlay hidden">
    <div class="busy-message">当前有分析任务运行中，请稍后再试</div>
  </div>

  <!-- Access Password Gate -->
  <div id="auth-overlay" class="busy-overlay hidden">
    <form id="auth-form" class="auth-box" autocomplete="off">
      <div class="auth-title">需要访问口令</div>
      <!-- Hidden username so the browser's credential autofill binds to THIS
           form (scoped here) instead of treating the ticker box as a
           username field on the otherwise form-less page. -->
      <input type="text" name="username" autocomplete="username"
             tabindex="-1" aria-hidden="true"
             style="position:absolute;left:-9999px;width:1px;height:1px">
      <input id="auth-input" class="auth-input" type="password"
             name="password" placeholder="请输入口令"
             autocomplete="current-password">
      <div id="auth-error" class="auth-error"></div>
      <button id="auth-btn" type="submit" class="submit-btn">进入</button>
    </form>
  </div>

  <!-- History Overlay -->
  <div id="history-overlay" class="busy-overlay hidden">
    <div class="history-box">
      <div class="history-head">
        <span class="auth-title">历史记录</span>
        <button id="history-close" class="history-close" type="button">✕</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <!-- Main Panel -->
  <div class="main-panel">
    <!-- Left: Agent Progress -->
    <div class="progress-panel">
      <div class="progress-header">
        <span class="panel-title">智能体进度</span>
        <button class="collapse-btn" id="collapse-btn">▾</button>
      </div>
      <div id="progress-body">
        <div class="progress-bar-row">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <span class="progress-label" id="progress-label">0 / 0</span>
        </div>
        <div id="agent-list" class="agent-list"></div>
      </div>
    </div>

    <!-- Right: Reports -->
    <div class="reports-panel" id="reports-panel">
      <!-- Decision Card (pinned top) -->
      <div id="decision-card" class="decision-card hidden">
        <div class="decision-action" id="decision-action">—</div>
        <div class="decision-detail" id="decision-detail"></div>
      </div>
      <!-- Report cards injected here -->
      <div id="report-cards"></div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <span id="status-text">就绪</span>
    <span id="status-hint"></span>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
