<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情绪扫描历史 — TradingAgents</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Viewer-specific styling — keeps the page minimal + readable on top
       of the shared theme tokens. No inline JS (CSP forbids it). */
    .viewer-wrap { max-width: 880px; margin: 0 auto; padding: 24px 20px 80px; }
    .viewer-back { display: inline-block; color: var(--text-dim); font-size: 12px;
      text-decoration: none; margin-bottom: 12px; }
    .viewer-back:hover { color: var(--accent); }
    .viewer-title { font-size: 22px; font-weight: 800; color: var(--text-primary);
      letter-spacing: 0.5px; margin-bottom: 4px; word-break: break-word; }
    .viewer-meta { color: var(--text-secondary); font-size: 12px; line-height: 1.6;
      margin-bottom: 6px; }
    .viewer-meta .badge { display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-weight: 700; font-size: 10px; margin-right: 6px; }
    .viewer-meta .badge.BUY { background: var(--green-bg); color: var(--green); }
    .viewer-meta .badge.SELL { background: var(--red-bg); color: var(--red); }
    .viewer-meta .badge.HOLD { background: var(--amber-bg); color: var(--amber); }
    .viewer-fund { color: var(--text-secondary); font-size: 11px; font-family: monospace;
      margin-bottom: 18px; }
    .viewer-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px;
      border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .viewer-tab { background: transparent; border: 1px solid transparent;
      color: var(--text-dim); font-size: 12px; padding: 6px 12px; border-radius: 6px 6px 0 0;
      cursor: pointer; transition: all 0.15s; }
    .viewer-tab:hover { color: var(--text-secondary); background: var(--bg-hover); }
    .viewer-tab.active { color: var(--accent-light); background: var(--bg-elevated);
      border-color: var(--border); border-bottom-color: var(--bg-elevated); }
    .viewer-tab.missing { opacity: 0.4; text-decoration: line-through; cursor: not-allowed; }
    .viewer-body { background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 18px 22px; min-height: 200px; color: var(--text-secondary);
      font-size: 13px; line-height: 1.75; }
    .viewer-body.loading { color: var(--text-dim); font-style: italic; text-align: center;
      padding: 60px 20px; }
    .viewer-body h1, .viewer-body h2, .viewer-body h3 {
      color: var(--text-primary); margin: 16px 0 8px; }
    .viewer-body h1 { font-size: 18px; }
    .viewer-body h2 { font-size: 15px; }
    .viewer-body h3 { font-size: 13px; }
    .viewer-body p { margin: 8px 0; }
    .viewer-body strong { color: var(--text-primary); }
    .viewer-body code { background: var(--bg-elevated); padding: 1px 5px; border-radius: 3px;
      font-size: 12px; }
    .viewer-body table { border-collapse: collapse; width: 100%; font-size: 12px;
      margin: 10px 0; }
    .viewer-body th { background: var(--bg-elevated); padding: 5px 10px; text-align: left;
      border: 1px solid var(--border); color: var(--text-primary); }
    .viewer-body td { padding: 5px 10px; border: 1px solid var(--border); }
    .viewer-body ul, .viewer-body ol { margin: 8px 0 8px 22px; }
    .viewer-body li { margin: 3px 0; }
    .viewer-body pre { background: var(--bg-elevated); padding: 10px 14px; border-radius: 6px;
      overflow-x: auto; font-size: 11px; margin: 8px 0; }
    .viewer-empty { color: var(--text-dim); text-align: center; padding: 60px 20px;
      font-size: 12px; }
    .viewer-empty .hint { display: block; margin-top: 8px; font-size: 11px; color: var(--text-dim); }
    .viewer-raw { white-space: pre-wrap; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
  <script src="/vendor/marked-12.0.2.min.js"></script>
  <script src="/vendor/purify-3.1.7.min.js"></script>
</head>
<body>
  <div class="viewer-wrap">
    <a class="viewer-back" href="/">← 返回主页</a>
    <h1 class="viewer-title" id="viewer-title">加载中…</h1>
    <div class="viewer-meta" id="viewer-meta"></div>
    <div class="viewer-fund" id="viewer-fund"></div>
    <div class="viewer-tabs" id="viewer-tabs"></div>
    <div class="viewer-body loading" id="viewer-body">加载中…</div>
  </div>
  <script src="/sentiment-scan.js"></script>
</body>
</html>
